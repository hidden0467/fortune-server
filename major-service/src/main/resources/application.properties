server.port=${SERVER_PORT:8098}

spring.application.name=fortune-service

# 运行时通过环境变量注入数据库连接信息，避免仓库中保存固定凭据
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=${DB_URL:jdbc:mysql://127.0.0.1:3306/sys?useUnicode=true&characterEncoding=UTF-8&serverTimezone=UTC&useSSL=false&tinyInt1isBit=false}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}

logging.level.com.zaxxer.hikari=INFO
logging.level.org.mybatis=DEBUG
logging.level.org.springframework.jdbc=DEBUG
